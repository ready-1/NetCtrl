{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h1>{{ page.title }}</h1>
    <p>{{ page.content|safe }}</p>
    <a href="{% url 'wiki:wiki_edit' page.pk %}" class="btn btn-primary">Edit</a>
    <form action="{% url 'wiki:wiki_delete' page.pk %}" method="post" style="display: inline;">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Delete</button>
    </form>
    <a href="{% url 'wiki:wiki_list' %}" class="btn btn-secondary">Back</a>
</div>
{% endblock %}
