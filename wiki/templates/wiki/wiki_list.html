{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Wiki Pages</h1>
        <a href="{% url 'wiki:wiki_add' %}" class="btn btn-success">Create New Page</a>
    </div>
    <ul class="list-group">
        {% for page in pages %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                <a href="{% url 'wiki:wiki_detail' page.pk %}">{{ page.title }}</a>
                <a href="{% url 'wiki:wiki_edit' page.pk %}" class="btn btn-sm btn-primary">Edit</a>
            </li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
