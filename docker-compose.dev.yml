services:
  postgres:
    image: postgres:15
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - backend

  redis:
    image: redis:7.0.12
    volumes:
      - redis_data:/data
    networks:
      - backend

  django:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - backend

  celery:
    build: .
    command: celery -A netctrl worker --loglevel=info
    env_file: .env
    depends_on:
      - redis
      - django
    networks:
      - backend

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - django
    networks:
      - frontend
      - backend

  tftp:
    image: jumanjiman/tftp:latest
    ports:
      - "69:69/udp"
    volumes:
      - tftp_data:/var/tftpboot
    networks:
      - backend

  vault:
    image: hashicorp/vault:1.15.4
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "test-token-123"
      VAULT_ADDR: "http://0.0.0.0:8200"
    ports:
      - "8200:8200"
    volumes:
      - vault_data:/vault/data
    networks:
      - backend

  ca-manager:
    image: python:3.11-alpine
    command: python -m ca_manager
    volumes:
      - ./ca:/app
      - cert_data:/certs
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "${VAULT_ROOT_TOKEN}"
    networks:
      - backend
    depends_on:
      - vault

networks:
  frontend:
  backend:

volumes:
  postgres_data:
  redis_data:
  tftp_data:
  cert_data:
  vault_data:
