{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h1>{{ action }} Switch</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">{{ action }}</button>
        <a href="{% url 'net_frontend:switch_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
