<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>NetCtrl</title>
    <!-- Bootstrap 5 CSS -->
    <link href="/static/vendor/bootstrap/bootstrap-5.3.2-dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="/static/vendor/fontawesome/fontawesome-free-6.0.0-web/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/static/css/base/variables.css" rel="stylesheet">
    <link href="/static/css/base/utilities.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <link href="/static/css/components/buttons.css" rel="stylesheet">
    <link href="/static/css/components/cards.css" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100 {% if dark_mode %}nc-dark-theme{% endif %}">
    {% block header %}{% endblock %}

    <div class="content container py-4 flex-grow-1">
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}" role="alert">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <!-- Loading Spinner -->
    {% include "components/loading.html" %}

    <!-- Bootstrap 5 JS Bundle -->
    <script src="/static/vendor/bootstrap/bootstrap-5.3.2-dist/js/bootstrap.bundle.min.js"></script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <!-- Custom JS -->
    <script src="/static/js/utils/htmx-config.js"></script>
    <script src="/static/js/utils/charts.js"></script>
    <script src="/static/js/utils/websocket.js"></script>
    <script src="/static/js/main.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
