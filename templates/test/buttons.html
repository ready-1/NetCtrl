{% extends "base.html" %}
{% block content %}
<div class="container">
  <button class="btn nc-btn-primary">Primary</button>
  <button class="btn nc-btn-secondary">Secondary</button>
  <button class="btn nc-btn-success">Success</button>
  <button class="btn nc-btn-danger">Danger</button>
  <button class="btn nc-btn-warning">Warning</button>
  <button class="btn nc-btn-info">Info</button>
  <button class="btn nc-btn-light">Light</button>
  <button class="btn nc-btn-dark">Dark</button>

  <div class="mt-3">
    <button class="btn nc-btn-primary" disabled>Disabled</button>
    <button class="btn nc-btn-primary nc-btn-loading">
      <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
      Loading...
    </button>
  </div>
</div>
{% endblock %}
