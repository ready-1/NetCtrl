{% extends "base.html" %}
{% block content %}
<div class="container">
  <div class="nc-card">
    <div class="nc-card-header">
      <div class="nc-card-header-title">Test Alert</div>
    </div>
    <div class="nc-card-body">
      <div id="alert-container">
        <div class="alert alert-success alert-dismissible fade show nc-alert" role="alert">
          <i class="bi bi-check-circle-fill me-2"></i>
          Initial success alert
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      </div>
      <button class="nc-btn nc-btn-success" hx-post="{% url 'tests:test-alert' %}" hx-target="#alert-container">
        Show Success Alert
      </button>
      <button class="nc-btn nc-btn-danger" hx-post="{% url 'tests:test-alert' %}" hx-target="#alert-container" hx-vals='{"error": "true"}'>
        Show Error Alert
      </button>
    </div>
  </div>
</div>
{% endblock %}
