{% extends "base.html" %}
{% block content %}
<div class="container">
  <button class="btn nc-btn-primary" role="button">Primary</button>
  <button class="btn nc-btn-secondary" role="button">Secondary</button>
  <button class="btn nc-btn-success" role="button">Success</button>
  <button class="btn nc-btn-danger" role="button">Danger</button>
  <button class="btn nc-btn-warning" role="button">Warning</button>
  <button class="btn nc-btn-info" role="button">Info</button>
  <button class="btn nc-btn-light" role="button">Light</button>
  <button class="btn nc-btn-dark" role="button">Dark</button>

  <div class="mt-3">
    <button class="btn nc-btn-primary" disabled aria-disabled="true" role="button">Disabled</button>
    <button class="btn nc-btn-primary nc-btn-loading" aria-busy="true" aria-disabled="true" role="button">
      <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
      Loading...
    </button>
  </div>
</div>
{% endblock %}
