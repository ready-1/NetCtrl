{% extends "base.html" %}
{% block content %}
<div class="container">
  <div class="nc-card">
    <div class="nc-card-header">
      <div class="nc-card-header-title">Test Network Failure</div>
    </div>
    <div class="nc-card-body">
      <form hx-post="{% url 'netctrl:test-network-failure' %}" hx-target="#failure-result">
        <input type="hidden" name="data" value="{{ "x" * 2097152 }}">
        <button type="submit" class="nc-btn nc-btn-danger" role="button">
          Trigger Large Request
        </button>
      </form>
      <div id="failure-result" class="mt-3" role="status" aria-live="polite"></div>
    </div>
  </div>
</div>
{% endblock %}
