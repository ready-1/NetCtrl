{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    Switch Statistics - {{ switch.name }}
                </div>
                <div class="card-body">
                    <div id="stats-content" hx-get="{% url 'netctrl:switch_stats' switch.id %}" hx-trigger="every 5s">
                        {% include "components/loading.html" %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
