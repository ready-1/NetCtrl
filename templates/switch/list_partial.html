<div class="row">
  {% for switch in switches %}
  <div class="col-md-4 mb-3">
    <div class="card">
      <div class="card-body">
        <h5 class="card-title">{{ switch.name }}</h5>
        <p class="card-text">IP: {{ switch.ip_address }}</p>
        <div class="btn-group">
          <a href="{% url 'netctrl:switch-detail' switch.id %}" class="btn btn-primary">View</a>
          <a href="{% url 'netctrl:switch-edit' switch.id %}" class="btn btn-secondary">Edit</a>
          <a href="{% url 'netctrl:switch-delete' switch.id %}" class="btn btn-danger">Delete</a>
        </div>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
