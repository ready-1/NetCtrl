{% extends "base.html" %}
{% block content %}
<div class="container">
  <div class="nc-card">
    <div class="nc-card-header">
      <h1 class="nc-card-header-title">User Profile</h1>
    </div>
    <div class="nc-card-body">
      <form method="post" class="needs-validation" novalidate>
        {% csrf_token %}
        <div class="row">
          <div class="col-md-6">
            <div class="mb-3">
              <label for="username" class="form-label">Username</label>
              <input type="text" class="form-control" id="username" value="{{ user.username }}" readonly>
            </div>
          </div>
          <div class="col-md-6">
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}">
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-md-6">
            <div class="mb-3">
              <label for="first_name" class="form-label">First Name</label>
              <input type="text" class="form-control" id="first_name" name="first_name" value="{{ user.first_name }}">
            </div>
          </div>
          <div class="col-md-6">
            <div class="mb-3">
              <label for="last_name" class="form-label">Last Name</label>
              <input type="text" class="form-control" id="last_name" name="last_name" value="{{ user.last_name }}">
            </div>
          </div>
        </div>
        <div class="mb-3">
          <label for="role" class="form-label">Role</label>
          <input type="text" class="form-control" id="role" value="{{ user.get_role_display }}" readonly>
        </div>
        <div class="d-flex justify-content-between align-items-center">
          <a href="{% url 'netctrl:home' %}" class="nc-btn nc-btn-secondary">Back</a>
          <button type="submit" class="nc-btn nc-btn-primary">Update Profile</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
