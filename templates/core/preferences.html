{% extends "base.html" %}
{% block content %}
<div class="container">
  <div class="nc-card">
    <div class="nc-card-header">
      <h1 class="nc-card-header-title">User Preferences</h1>
    </div>
    <div class="nc-card-body">
      <form method="post" class="needs-validation" novalidate>
        {% csrf_token %}
        <div class="mb-3">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="dark_mode" name="dark_mode" {% if request.session.dark_mode %}checked{% endif %}>
            <label class="form-check-label" for="dark_mode">Dark Mode</label>
          </div>
        </div>
        <div class="mb-3">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="notifications_enabled" name="notifications_enabled" {% if user.notifications_enabled %}checked{% endif %}>
            <label class="form-check-label" for="notifications_enabled">Enable Notifications</label>
          </div>
        </div>
        <div class="mb-3">
          <label for="refresh_interval" class="form-label">Dashboard Refresh Interval (seconds)</label>
          <select class="form-select" id="refresh_interval" name="refresh_interval">
            <option value="5" {% if user.refresh_interval == 5 %}selected{% endif %}>5 seconds</option>
            <option value="10" {% if user.refresh_interval == 10 %}selected{% endif %}>10 seconds</option>
            <option value="30" {% if user.refresh_interval == 30 %}selected{% endif %}>30 seconds</option>
            <option value="60" {% if user.refresh_interval == 60 %}selected{% endif %}>1 minute</option>
          </select>
        </div>
        <div class="d-flex justify-content-between align-items-center">
          <a href="{% url 'netctrl:home' %}" class="nc-btn nc-btn-secondary">Back</a>
          <button type="submit" class="nc-btn nc-btn-primary">Save Preferences</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
