{% comment %}
Button components template
{% endcomment %}

<div class="nc-btn-group">
    <!-- Primary button -->
    <button type="button" class="nc-btn nc-btn-primary">
        Primary Button
    </button>

    <!-- Secondary button -->
    <button type="button" class="nc-btn nc-btn-secondary">
        Secondary Button
    </button>

    <!-- Success button -->
    <button type="button" class="nc-btn nc-btn-success">
        Success Button
    </button>

    <!-- Danger button -->
    <button type="button" class="nc-btn nc-btn-danger">
        Danger Button
    </button>

    <!-- Disabled button -->
    <button type="button" class="nc-btn nc-btn-primary" disabled aria-disabled="true">
        Disabled Button
    </button>

    <!-- Loading button -->
    <button type="button" class="nc-btn nc-btn-primary nc-btn-loading">
        <span class="loading-spinner" role="status" aria-hidden="true"></span>
        Loading...
    </button>
</div>
