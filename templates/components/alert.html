{% if type == "success" %}
<div class="alert alert-success alert-dismissible fade show nc-alert" role="alert">
  <i class="bi bi-check-circle-fill me-2"></i>
  {{ message }}
  <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>
{% elif type == "warning" %}
<div class="alert alert-warning alert-dismissible fade show nc-alert" role="alert">
  <i class="bi bi-exclamation-triangle-fill me-2"></i>
  {{ message }}
  <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>
{% elif type == "danger" %}
<div class="alert alert-danger alert-dismissible fade show nc-alert" role="alert">
  <i class="bi bi-x-circle-fill me-2"></i>
  {{ message }}
  <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>
{% else %}
<div class="alert alert-info alert-dismissible fade show nc-alert" role="alert">
  <i class="bi bi-info-circle-fill me-2"></i>
  {{ message }}
  <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>
{% endif %}
