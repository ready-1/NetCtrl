<style>
.file-browser.grid-view .list-group {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 1rem;
}

.file-browser .list-group-item {
    cursor: pointer;
    position: relative;
}

/* Grid view styles */
.file-browser.grid-view .list-group-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    height: 160px;
    margin: 0;
    padding: 1rem 1rem 3rem 1rem;
}

.file-browser.grid-view .item-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
}

.file-browser.grid-view .item-icon {
    font-size: 2rem;
    margin-bottom: 0.5rem;
}

.file-browser.grid-view .item-name {
    margin-bottom: 0.5rem;
    word-break: break-word;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* List view styles */
.file-browser.list-view .list-group-item {
    margin-bottom: 0.25rem;
    padding: 0.5rem 1rem;
}

.file-browser.list-view .item-content {
    display: flex;
    align-items: center;
}

.file-browser.list-view .item-icon {
    margin-right: 0.5rem;
}

/* Button group styles */
.file-browser .btn-group {
    z-index: 2;
    position: absolute;
    bottom: 5px;
    right: 5px;
    background: rgba(255, 255, 255, 0.9);
    padding: 0.25rem;
    border-radius: 0.25rem;
}

.file-browser.grid-view .btn-group {
    display: none;
}

.file-browser.grid-view .list-group-item:hover .btn-group {
    display: flex;
}
</style>

<!-- File Browser Component -->
<div class="list-group">
    {% for item in items %}
        <div class="list-group-item list-group-item-action" onclick="handleItemClick('{{ item.name }}', {{ item.is_dir|yesno:'true,false' }}, '{{ item.url|default:'' }}', '{{ item.parent_path|default:'' }}')">
            <div class="item-content">
                <div class="item-icon">
                    {% if item.is_dir %}
                        <i class="bi bi-folder text-primary"></i>
                    {% else %}
                        <i class="bi bi-file-text"></i>
                    {% endif %}
                </div>
                <span class="item-name">{{ item.name }}</span>
            </div>
            <div class="btn-group" onclick="event.stopPropagation()">
                {% if not item.is_dir %}
                    <a href="{{ item.url }}" class="btn btn-sm btn-outline-secondary" download>
                        <i class="bi bi-download"></i>
                    </a>
                {% endif %}
                <button class="btn btn-sm btn-outline-secondary" onclick="moveItem('{{ item.name }}', {{ item.is_dir|yesno:'true,false' }})">
                    <i class="bi bi-arrows-move"></i>
                </button>
                <button class="btn btn-sm btn-outline-secondary" onclick="renameItem('{{ item.name }}', {{ item.is_dir|yesno:'true,false' }})">
                    <i class="bi bi-pencil"></i>
                </button>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteItem('{{ item.name }}', {{ item.is_dir|yesno:'true,false' }})">
                    <i class="bi bi-trash"></i>
                </button>
            </div>
        </div>
    {% empty %}
        <div class="list-group-item text-center text-muted">
            No files or folders yet
        </div>
    {% endfor %}
</div>
