<style>
.file-browser.grid-view .list-group {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 1rem;
}

.file-browser.grid-view .list-group-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    height: 150px;
    margin: 0;
    padding: 1rem;
}

.file-browser.grid-view .item-icon {
    font-size: 2rem;
    margin-bottom: 0.5rem;
}

.file-browser.grid-view .item-name {
    margin-bottom: 0.5rem;
    word-break: break-word;
}

.file-browser.grid-view .btn-group {
    display: none;
}

.file-browser.grid-view .list-group-item:hover .btn-group {
    display: flex;
    position: absolute;
    top: 5px;
    right: 5px;
    background: rgba(255, 255, 255, 0.9);
    padding: 0.25rem;
    border-radius: 0.25rem;
}

.file-browser.list-view .list-group-item {
    margin-bottom: 0.25rem;
}

.item-content {
    cursor: pointer;
}
</style>

<!-- File Browser Component -->
<div class="list-group">
    {% for item in items %}
        <div class="list-group-item list-group-item-action">
            <div class="d-flex w-100 justify-content-between align-items-center">
                <div class="item-content" onclick="handleItemClick('{{ item.name }}', {{ item.is_dir|yesno:'true,false' }}, '{{ item.url|default:'' }}')">
                    <div class="item-icon">
                        {% if item.is_dir %}
                            <i class="bi bi-folder text-primary"></i>
                        {% else %}
                            <i class="bi bi-file-text"></i>
                        {% endif %}
                    </div>
                    <span class="item-name ms-2">{{ item.name }}</span>
                </div>
                <div class="btn-group">
                    {% if not item.is_dir %}
                        <a href="{{ item.url }}" class="btn btn-sm btn-outline-secondary" download>
                            <i class="bi bi-download"></i>
                        </a>
                    {% endif %}
                    <button class="btn btn-sm btn-outline-secondary" onclick="renameItem('{{ item.name }}', {{ item.is_dir|yesno:'true,false' }})">
                        <i class="bi bi-pencil"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteItem('{{ item.name }}', {{ item.is_dir|yesno:'true,false' }})">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>
        </div>
    {% empty %}
        <div class="list-group-item text-center text-muted">
            No files or folders yet
        </div>
    {% endfor %}
</div>
