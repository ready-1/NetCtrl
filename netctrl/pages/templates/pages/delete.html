{% extends "base.html" %} {% block content %} 
<h1>Delete</h1>

This will delete {{ page.title }}. <br />
This action cannot be undone.<br />

<span class="text-danger">Are you sure?</span>
<form action="/page/delete/{{ page.slug}}/" method="post" class="mt-2">
    {% csrf_token %}
    <input class ="btn btn-danger" type="submit" value="Delete">
    <a class ="btn btn-secondary" href="{% url 'page' page.slug %}">Cancel</a>
{% endblock %}
