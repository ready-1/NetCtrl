{% extends "base.html" %} 
{% block content %}


<h1>{{ page.title }}</h1>
{{ page.content|safe }}
{% if request.path != '/' %}
<p><a href="{% url 'pages:pages' %}"><button type="button" class="btn btn-primary btn-sm">Back</button></a>
<a href="{% url 'pages:edit' page.slug %}"><button type="button" class="btn btn-warning btn-sm">Edit</button></a>
<a href="{% url 'pages:delete' page.slug %}"><button type="button" class="btn btn-danger btn-sm">Delete</button></a>
</p>
{% endif %}
{% endblock %}
