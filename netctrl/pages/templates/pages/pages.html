{% extends "base.html" %} {% block content %} 
<h1>Page List</h1>
<table class="table table-striped">
    <thead>
      <tr>
        <th scope="col">Title</th>
        <th scope="col">Slug</th>
        <th scope="col">Actions</th>
      </tr>
    </thead>
    <tbody>
        {% for page in pages %}
        <tr class=>
        <td><a href="{% url 'pages:page' page.slug %}"> {{ page.title }}</a></td>
        <td>
            {{ page.slug }}
        </td>
        <td>
            <a href="{% url 'pages:edit' page.slug %}"><button type="button" class="btn btn-primary btn-sm">Edit</button></a>
            <a href="{% url 'pages:delete' page.slug %}"><button type="button" class="btn btn-danger btn-sm">Delete</button></a>
        </td>

      </tr>
      {% endfor %}
    </tbody>
  </table>

  <a href="{% url 'pages:create' %}"><button type="button" class="btn btn-sm btn-primary">New Page</button></a>



{% endblock %}
