{% extends "base.html" %}

{% block content %}

{% for device in devices %}

<div class="card" style="width: 18rem;">
    <div class="card-body">
        <a class="btn btn-sm 
        {% if device.alive %} btn-success {% else %} btn-danger {% endif %}
        " href="{% url 'devices:device' device.short_name %}"> <h5 class="card-title">{{ device.short_name }}</h5></a>
        <div class="mt-3">
        <a class="btn btn-sm btn-warning" target="_blank" href="http://{{ device.in_band_ip }}" class="card-link">In Band</a>
        <a class="btn btn-sm btn-primary" target="_blank" href="http://{{ device.out_band_ip }}" class="card-link">Out Band</a>
        </div>
    </div>
  </div>
  {% empty %}
    <p>No devices found.</p>
{% endfor %}
<a href="{% url 'devices:create' %}"><span class="btn btn-sm btn-primary mt-2" >New Device</span></a>
{% endblock %}
