{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>CLI Manual - {{ filename }}</title>
    <link rel="stylesheet" href="{% static 'admin/css/base.css' %}">
    <style>
        body {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        pre {
            background-color: #f5f5f5;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
        }
        code {
            font-family: SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
    </style>
</head>
<body>
    <div id="content">
        <h1>CLI Manual - {{ filename }}</h1>
        <div class="module">
            {% include filename %}
        </div>
    </div>
</body>
</html>
