name: netctrl

services:
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/netctrl/certs:/etc/nginx/certs:ro
      - /opt/netctrl/static:/usr/share/nginx/static:ro
      - /opt/netctrl/media:/usr/share/nginx/media:ro
      - /opt/netctrl/app/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    expose:
      - "8000"
    volumes:
      - /opt/netctrl/app:/app:ro
      - /opt/netctrl/static:/opt/static
      - /opt/netctrl/media:/opt/media
      - /opt/netctrl/logs:/opt/logs
    env_file:
      - .env
    environment:
      # Fixed values that shouldn't come from .env
      DJANGO_SETTINGS_MODULE: config.settings
      POSTGRES_HOST: db
      STATIC_ROOT: /opt/static
      MEDIA_ROOT: /opt/media
      LOG_DIR: /opt/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:15-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data: {}
  redis_data: {}
