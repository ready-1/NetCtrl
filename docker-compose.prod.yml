version: '3.8'

services:
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/netctrl/certs:/etc/nginx/certs:ro
      - /opt/netctrl/static:/usr/share/nginx/static:ro
      - /opt/netctrl/media:/usr/share/nginx/media:ro
      - /opt/netctrl/app/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

  web:
    build: .
    restart: always
    expose:
      - "8000"
    volumes:
      - /opt/netctrl/app:/app:ro
      - /opt/netctrl/static:/opt/static
      - /opt/netctrl/media:/opt/media
      - /opt/netctrl/logs:/opt/logs
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - STATIC_ROOT=/opt/static
      - MEDIA_ROOT=/opt/media
      - LOG_DIR=/opt/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:15-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: always
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
