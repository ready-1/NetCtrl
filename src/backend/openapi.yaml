openapi: 3.1.0
info:
  title: NetCtrl CMS
  description: API for the NetCtrl CMS with role-based access control
  version: 1.0.0
paths:
  /:
    get:
      summary: Root
      description: Root endpoint that returns API information
      operationId: root__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/health:
    get:
      summary: Health Check
      description: Health check endpoint
      operationId: health_check_api_v1_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/jwt/login:
    post:
      tags:
      - auth
      summary: Login
      description: Custom login route that authenticates with username
      operationId: login_api_v1_jwt_login_post
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Body_login_api_v1_jwt_login_post'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/register/register:
    post:
      tags:
      - auth
      summary: Register:Register
      operationId: register_register_api_v1_register_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRead'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                REGISTER_USER_ALREADY_EXISTS:
                  summary: A user with this email already exists.
                  value:
                    detail: REGISTER_USER_ALREADY_EXISTS
                REGISTER_INVALID_PASSWORD:
                  summary: Password validation failed.
                  value:
                    detail:
                      code: REGISTER_INVALID_PASSWORD
                      reason: Password should beat least 3 characters
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users/me:
    get:
      tags:
      - users
      summary: Get Current User
      description: 'Get the current authenticated user''s details


        This endpoint returns details about the currently authenticated user,

        including their role information. Requires authentication.'
      operationId: get_current_user_api_v1_users_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithRoles'
      security:
      - OAuth2PasswordBearer: []
    patch:
      tags:
      - auth
      summary: Users:Patch Current User
      operationId: users_patch_current_user_api_v1_users_me_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRead'
        '401':
          description: Missing token or inactive user.
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                UPDATE_USER_EMAIL_ALREADY_EXISTS:
                  summary: A user with this email already exists.
                  value:
                    detail: UPDATE_USER_EMAIL_ALREADY_EXISTS
                UPDATE_USER_INVALID_PASSWORD:
                  summary: Password validation failed.
                  value:
                    detail:
                      code: UPDATE_USER_INVALID_PASSWORD
                      reason: Password should beat least 3 characters
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - OAuth2PasswordBearer: []
  /api/v1/users/{id}:
    get:
      tags:
      - auth
      summary: Users:User
      operationId: users_user_api_v1_users__id__get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          title: Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRead'
        '401':
          description: Missing token or inactive user.
        '403':
          description: Not a superuser.
        '404':
          description: The user does not exist.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - auth
      summary: Users:Patch User
      operationId: users_patch_user_api_v1_users__id__patch
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          title: Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRead'
        '401':
          description: Missing token or inactive user.
        '403':
          description: Not a superuser.
        '404':
          description: The user does not exist.
        '400':
          content:
            application/json:
              examples:
                UPDATE_USER_EMAIL_ALREADY_EXISTS:
                  summary: A user with this email already exists.
                  value:
                    detail: UPDATE_USER_EMAIL_ALREADY_EXISTS
                UPDATE_USER_INVALID_PASSWORD:
                  summary: Password validation failed.
                  value:
                    detail:
                      code: UPDATE_USER_INVALID_PASSWORD
                      reason: Password should beat least 3 characters
              schema:
                $ref: '#/components/schemas/ErrorModel'
          description: Bad Request
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - auth
      summary: Users:Delete User
      operationId: users_delete_user_api_v1_users__id__delete
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          title: Id
      responses:
        '204':
          description: Successful Response
        '401':
          description: Missing token or inactive user.
        '403':
          description: Not a superuser.
        '404':
          description: The user does not exist.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/logout:
    post:
      summary: Auth:Jwt.Logout
      operationId: auth_jwt_logout_api_v1_logout_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '401':
          description: Missing token or inactive user.
      security:
      - OAuth2PasswordBearer: []
  /api/v1/roles/:
    get:
      tags:
      - roles
      summary: List Roles
      description: 'List all available roles


        Returns a list of all role names in the system.

        This endpoint is accessible to everyone.'
      operationId: list_roles_api_v1_roles__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  type: string
                type: array
                title: Response List Roles Api V1 Roles  Get
  /api/v1/roles/{role}/users:
    get:
      tags:
      - roles
      summary: List Users By Role
      description: 'List all users with a specific role


        This endpoint allows administrators to list all users with a specific role.

        Requires admin privileges.'
      operationId: list_users_by_role_api_v1_roles__role__users_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: role
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/UserRole'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserRead'
                title: Response List Users By Role Api V1 Roles  Role  Users Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/roles/my-permissions:
    get:
      tags:
      - roles
      summary: Get Current User Permissions
      description: 'Get the current user''s role-based permissions


        This endpoint returns a dictionary of permission flags for the current user

        based on their role. This can be used by the frontend to show/hide UI elements.'
      operationId: get_current_user_permissions_api_v1_roles_my_permissions_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: boolean
                type: object
                title: Response Get Current User Permissions Api V1 Roles My Permissions
                  Get
      security:
      - OAuth2PasswordBearer: []
  /api/v1/roles/assign/{user_id}:
    put:
      tags:
      - roles
      summary: Assign Role To User
      description: 'Assign a role to a user


        This endpoint allows administrators to assign a new role to a user.

        Requires admin privileges.'
      operationId: assign_role_to_user_api_v1_roles_assign__user_id__put
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: integer
          title: User Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRole'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithRoles'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users/:
    get:
      tags:
      - users
      summary: List Users
      description: 'List all users with optional filtering by role


        This endpoint allows administrators to list all users in the system,

        optionally filtered by role. Supports pagination.

        Requires admin privileges.'
      operationId: list_users_api_v1_users__get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: skip
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Skip
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 100
          title: Limit
      - name: role
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/UserRole'
          - type: 'null'
          title: Role
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserRead'
                title: Response List Users Api V1 Users  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - users
      summary: Create User
      description: 'Create a new user


        This endpoint allows administrators and managers to create new users.

        Managers cannot create admin users. Regular users cannot create users.'
      operationId: create_user_api_v1_users__post
      security:
      - OAuth2PasswordBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRead'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users/{user_id}:
    get:
      tags:
      - users
      summary: Get User By Id
      description: 'Get a specific user by ID


        This endpoint returns details about a specific user. Regular users can only

        access their own information. Managers and admins can access any user.'
      operationId: get_user_by_id_api_v1_users__user_id__get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: integer
          title: User Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithRoles'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - users
      summary: Update User
      description: 'Update a user


        This endpoint allows users to update their own information, and allows

        administrators and managers to update other users. Managers cannot update

        admin users or change user roles to admin.'
      operationId: update_user_api_v1_users__user_id__put
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: integer
          title: User Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithRoles'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - users
      summary: Delete User
      description: 'Delete a user


        This endpoint allows administrators to delete users, or users to delete

        their own accounts. Requires appropriate permissions.'
      operationId: delete_user_api_v1_users__user_id__delete
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: integer
          title: User Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/content/:
    post:
      tags:
      - content
      summary: Create Content
      description: 'Create a new content item.


        Requires an authenticated user.'
      operationId: create_content_api_v1_content__post
      security:
      - OAuth2PasswordBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContentCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentRead'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - content
      summary: List Content
      description: 'List content items with filtering and pagination.


        Requires an authenticated user. Results are filtered by user''s permissions.'
      operationId: list_content_api_v1_content__get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: skip
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          title: Skip items
          default: 0
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          title: Limit items
          default: 100
      - name: status_filter
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/ContentStatus'
          - type: 'null'
          title: Filter by status
      - name: content_type_filter
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/ContentType'
          - type: 'null'
          title: Filter by content type
      - name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Search in title, description, and body
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/content/{content_id}:
    get:
      tags:
      - content
      summary: Get Content
      description: 'Get a specific content item by ID.


        Requires an authenticated user with appropriate view permissions.'
      operationId: get_content_api_v1_content__content_id__get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: content_id
        in: path
        required: true
        schema:
          type: integer
          title: The ID of the content to get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentDetailRead'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - content
      summary: Update Content
      description: 'Update a content item.


        Requires an authenticated user with appropriate edit permissions.'
      operationId: update_content_api_v1_content__content_id__put
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: content_id
        in: path
        required: true
        schema:
          type: integer
          title: The ID of the content to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContentUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentRead'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - content
      summary: Delete Content
      description: 'Delete a content item.


        Requires an authenticated user with appropriate delete permissions.'
      operationId: delete_content_api_v1_content__content_id__delete
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: content_id
        in: path
        required: true
        schema:
          type: integer
          title: The ID of the content to delete
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/content/{content_id}/permissions:
    post:
      tags:
      - content
      summary: Set Content Permissions
      description: 'Set permissions for a content item.


        Requires an authenticated user with admin role or content creator.'
      operationId: set_content_permissions_api_v1_content__content_id__permissions_post
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: content_id
        in: path
        required: true
        schema:
          type: integer
          title: The ID of the content to set permissions for
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContentPermissionsUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: boolean
                title: Response Set Content Permissions Api V1 Content  Content Id  Permissions
                  Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - content
      summary: Get Content Permissions
      description: 'Get permissions for a content item.


        Requires an authenticated user with view permissions for the content.'
      operationId: get_content_permissions_api_v1_content__content_id__permissions_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: content_id
        in: path
        required: true
        schema:
          type: integer
          title: The ID of the content to get permissions for
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/PermissionSettings'
                title: Response Get Content Permissions Api V1 Content  Content Id  Permissions
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/files/:
    post:
      tags:
      - files
      summary: Upload File
      description: 'Upload a new file.


        Requires an authenticated user. If content_id is provided, the user must have
        permission to edit the content.'
      operationId: upload_file_api_v1_files__post
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: content_id
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          description: Content ID to associate with the file
          title: Content Id
        description: Content ID to associate with the file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_upload_file_api_v1_files__post'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentFileRead'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - files
      summary: List Files
      description: 'List files with filtering and pagination.


        Requires an authenticated user. Results are filtered by user''s permissions.'
      operationId: list_files_api_v1_files__get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: content_id
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          description: Filter files by content ID
          title: Content Id
        description: Filter files by content ID
      - name: skip
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          title: Skip items
          default: 0
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          title: Limit items
          default: 100
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentFileListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/files/{file_id}:
    get:
      tags:
      - files
      summary: Get File Metadata
      description: 'Get metadata for a specific file.


        Requires an authenticated user with appropriate permissions.'
      operationId: get_file_metadata_api_v1_files__file_id__get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: file_id
        in: path
        required: true
        schema:
          type: integer
          title: The ID of the file to get metadata for
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentFileRead'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - files
      summary: Update File Metadata
      description: 'Update metadata for a file.


        Requires an authenticated user with appropriate permissions.'
      operationId: update_file_metadata_api_v1_files__file_id__patch
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: file_id
        in: path
        required: true
        schema:
          type: integer
          title: The ID of the file to update metadata for
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: File metadata to update
              title: Metadata
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentFileRead'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - files
      summary: Delete File
