{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="card">
        <div class="card-body">
            <h5 class="card-title">Delete Switch</h5>
            <p class="card-text">Are you sure you want to delete the switch "{{ object.name }}"?</p>
            <p class="card-text text-muted">This action cannot be undone.</p>

            <form method="post">
                {% csrf_token %}
                <div class="btn-group">
                    <button type="submit" class="btn btn-danger">Confirm Delete</button>
                    <a href="{% url 'switches:switch-detail' object.pk %}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
