services:
  web:
    build: .
    command: poetry run python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DEBUG: "${DEBUG:-false}"  # Default to false if not provided
    depends_on:
      - db
    container_name: web
    hostname: web

  db:
    image: postgres:15
    container_name: db
    hostname: db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-default_user}"  # Default to 'default_user'
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-default_password}"  # Default to 'default_password'
      POSTGRES_DB: "${POSTGRES_DB:-default_db}"  # Default to 'default_db'

volumes:
  postgres_data: