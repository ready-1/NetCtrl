name: netctrl

services:
  # Syslog Service for Centralized Logging
  syslog:
    build:
      context: ./src/syslog
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./env-config/.env
      - ./env-config/services/syslog/.env
    volumes:
      - syslog_data:/var/log/cms
    networks:
      - app_network
    hostname: syslog
    container_name: syslog
    ports:
      - "514:514"
      - "514:514/udp"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # FastAPI Backend Service
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
      args:
        - PIP_INDEX_URL=${PIP_INDEX_URL:-https://pypi.org/simple}
        - PIP_TRUSTED_HOST=${PIP_TRUSTED_HOST:-pypi.org}
    restart: unless-stopped
    env_file:
      - ./env-config/.env
      - ./env-config/services/backend/.env
    volumes:
      - ./src/backend:/app
      - backend_data:/app/data
      - file_uploads:/app/uploads
    depends_on:
      database:
        condition: service_healthy
      syslog:
        condition: service_started
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL Database Service
  database:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - ./env-config/.env
      - ./env-config/services/database/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/init:/docker-entrypoint-initdb.d
      - ./src/database/backups:/var/lib/postgresql/backups
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cms_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # React Frontend Service
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      args:
        - NPM_REGISTRY=${NPM_REGISTRY:-https://registry.npmjs.org}
        - NODE_ENV=${NODE_ENV:-development}
    restart: unless-stopped
    env_file:
      - ./env-config/.env
      - ./env-config/services/frontend/.env
    volumes:
      - ./src/frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - app_network
    depends_on:
      - syslog
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # NGINX Reverse Proxy Service
  nginx:
    build:
      context: ./src/nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./env-config/.env
      - ./env-config/services/nginx/.env
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./src/nginx/conf:/etc/nginx/conf.d
      - ./src/nginx/ssl:/etc/nginx/ssl
      - static_files:/var/www/html/static
      - file_uploads:/var/www/html/uploads
      - ./src/nginx/templates:/etc/nginx/templates
    depends_on:
      - backend
      - syslog
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${NGINX_PORT:-80}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Persistent volumes
volumes:
  postgres_data:
    driver: local
  backend_data:
    driver: local
  file_uploads:
    driver: local
  static_files:
    driver: local
  frontend_node_modules:
    driver: local
  syslog_data:
    driver: local

# Network configuration - simplified to a single network
networks:
  app_network:
    driver: bridge
