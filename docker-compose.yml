version: '3.8'

services:
  flask:
    build:
      context: ./flask_app
    ports:
      - "5000:5000"
    volumes:
      - ./flask_app:/app
      - ./openapi_client:/app/openapi_client
      - shared_files:/app/shared_files
    environment:
      - FLASK_APP=app
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - SWITCH_DEFAULT_USERNAME=${SWITCH_DEFAULT_USERNAME}
      - SWITCH_DEFAULT_PASSWORD=${SWITCH_DEFAULT_PASSWORD}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - netctrl-network

  celery_worker:
    build:
      context: ./flask_app
    command: celery -A app.worker.celery worker --loglevel=info
    volumes:
      - ./flask_app:/app
      - ./openapi_client:/app/openapi_client
      - shared_files:/app/shared_files
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - SWITCH_DEFAULT_USERNAME=${SWITCH_DEFAULT_USERNAME}
      - SWITCH_DEFAULT_PASSWORD=${SWITCH_DEFAULT_PASSWORD}
    depends_on:
      - postgres
      - redis
      - flask
    restart: unless-stopped
    networks:
      - netctrl-network

  celery_beat:
    build:
      context: ./flask_app
    command: celery -A app.worker.celery beat --loglevel=info
    volumes:
      - ./flask_app:/app
      - ./openapi_client:/app/openapi_client
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
      - flask
    restart: unless-stopped
    networks:
      - netctrl-network

  postgres:
    image: postgres:14
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    restart: unless-stopped
    networks:
      - netctrl-network

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - netctrl-network

  nginx:
    build:
      context: ./nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d
      - ./frontend/build:/usr/share/nginx/html
      - shared_files:/usr/share/nginx/shared_files
    depends_on:
      - flask
    restart: unless-stopped
    networks:
      - netctrl-network

volumes:
  postgres_data:
  redis_data:
  shared_files:

networks:
  netctrl-network:
    driver: bridge
