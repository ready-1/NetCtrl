version: '3.8'

# CMS with RBAC Docker Compose Configuration
# This file defines all services required for the CMS application
# Configured for air-gapped operation with local dependency repositories

services:
  # FastAPI Backend Service
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
      args:
        - PIP_INDEX_URL=${PIP_INDEX_URL:-http://localhost:3141/simple}
        - PIP_TRUSTED_HOST=${PIP_TRUSTED_HOST:-localhost}
    restart: unless-stopped
    env_file:
      - ./env-config/.env
      - ./env-config/services/backend/.env
    volumes:
      - ./src/backend:/app
      - backend_data:/app/data
      - file_uploads:/app/uploads
    depends_on:
      database:
        condition: service_healthy
      syslog:
        condition: service_started
    networks:
      - backend_network
      - database_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "syslog"
      options:
        syslog-address: "udp://syslog:${SYSLOG_PORT:-514}"
        tag: "backend"

  # PostgreSQL Database Service
  database:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - ./env-config/.env
      - ./env-config/services/database/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/init:/docker-entrypoint-initdb.d
      - ./src/database/backups:/var/lib/postgresql/backups
    networks:
      - database_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cms_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "syslog"
      options:
        syslog-address: "udp://syslog:${SYSLOG_PORT:-514}"
        tag: "database"

  # React Frontend Service
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      args:
        - NPM_REGISTRY=${NPM_REGISTRY:-http://localhost:4873}
        - NODE_ENV=${NODE_ENV:-development}
    restart: unless-stopped
    env_file:
      - ./env-config/.env
      - ./env-config/services/frontend/.env
    volumes:
      - ./src/frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - frontend_network
    depends_on:
      - nginx
    logging:
      driver: "syslog"
      options:
        syslog-address: "udp://syslog:${SYSLOG_PORT:-514}"
        tag: "frontend"

  # NGINX Reverse Proxy Service
  nginx:
    build:
      context: ./src/nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./env-config/.env
      - ./env-config/services/nginx/.env
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./src/nginx/conf:/etc/nginx/conf.d
      - ./src/nginx/ssl:/etc/nginx/ssl
      - static_files:/var/www/html/static
      - file_uploads:/var/www/html/uploads
      - ./src/nginx/templates:/etc/nginx/templates
    depends_on:
      - backend
      - syslog
    networks:
      - frontend_network
      - backend_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${NGINX_PORT:-80}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "syslog"
      options:
        syslog-address: "udp://syslog:${SYSLOG_PORT:-514}"
        tag: "nginx"

  # Syslog Service for Centralized Logging
  syslog:
    build:
      context: ./src/syslog
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./env-config/.env
      - ./env-config/services/syslog/.env
    volumes:
      - syslog_data:/var/log/cms
    networks:
      - backend_network
      - frontend_network
      - database_network

# Local dependency repositories for air-gapped operation
  # PyPI mirror (using pypiserver)
  pypi_mirror:
    image: pypiserver/pypiserver:latest
    restart: unless-stopped
    volumes:
      - pypi_mirror_data:/data/packages
    networks:
      - backend_network
    ports:
      - "${PIP_REPO_PORT:-3141}:8080"
    command: -p 8080 -a . /data/packages
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "syslog"
      options:
        syslog-address: "udp://syslog:${SYSLOG_PORT:-514}"
        tag: "pypi_mirror"

  # NPM mirror (using verdaccio)
  npm_mirror:
    image: verdaccio/verdaccio
    restart: unless-stopped
    volumes:
      - npm_mirror_data:/verdaccio/storage
      - ./src/npm_mirror/conf:/verdaccio/conf
    networks:
      - frontend_network
    ports:
      - "${NPM_REPO_PORT:-4873}:4873"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4873"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "syslog"
      options:
        syslog-address: "udp://syslog:${SYSLOG_PORT:-514}"
        tag: "npm_mirror"

# Persistent volumes
volumes:
  postgres_data:
    driver: local
  backend_data:
    driver: local
  file_uploads:
    driver: local
  static_files:
    driver: local
  frontend_node_modules:
    driver: local
  syslog_data:
    driver: local
  pypi_mirror_data:
    driver: local
  npm_mirror_data:
    driver: local

# Network configuration
networks:
  frontend_network:
    driver: bridge
  backend_network:
    driver: bridge
  database_network:
    driver: bridge
