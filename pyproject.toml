[tool.poetry]
name = "netctrl"
version = "0.1.0"
description = "Net Control Application for NetGear AV Line Switches."
authors = ["Bob King <bob@getready1.com>"]
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.11"
django = "^5.1.3"
psycopg2-binary = "^2.9.10"
python-decouple = "^3.8"
django-tinymce = "^4.1.0"
django-taggit = "^6.1.0"
pillow = "^11.0.0"
requests = "^2.32.3"
django-redis = "^5.4.0"


[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
