{% extends "base.html" %}

{% block title %}{{ page_title }} - NetCtrl{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h1 class="mb-4">{{ page_title }}</h1>

        <div class="row">
            <!-- Switch Status Summary -->
            <div class="col-md-6 col-lg-4 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">Switch Status</h5>
                        <p class="card-text">
                            <span class="text-success">
                                <i class="fas fa-check-circle"></i> 0 Online
                            </span>
                            <br>
                            <span class="text-danger">
                                <i class="fas fa-times-circle"></i> 0 Offline
                            </span>
                        </p>
                    </div>
                </div>
            </div>

            <!-- Recent Activity -->
            <div class="col-md-6 col-lg-4 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">Recent Activity</h5>
                        <p class="card-text text-muted">
                            No recent activity
                        </p>
                    </div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="col-md-6 col-lg-4 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">Quick Actions</h5>
                        <div class="list-group">
                            <a href="#" class="list-group-item list-group-item-action">
                                <i class="fas fa-plus"></i> Add Switch
                            </a>
                            <a href="#" class="list-group-item list-group-item-action">
                                <i class="fas fa-cog"></i> Port Profiles
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
