<h1>Pending User Approvals</h1>
{% for user in pending_users %}
    <p>{{ user.full_name }} ({{ user.username }})</p>
    <form method="post">
        {% csrf_token %}
        <input type="hidden" name="user_id" value="{{ user.id }}">
        <button type="submit" name="action" value="approve">Approve</button>
    </form>
{% endfor %}
