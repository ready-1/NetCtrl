{% extends 'base.html' %}

{% block content %}
<h1>Pending User Approvals</h1>
<table>
    <thead>
        <tr>
            <th>Username</th>
            <th>Full Name</th>
            <th>Email</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for user in pending_users %}
        <tr>
            <td>{{ user.username }}</td>
            <td>{{ user.get_full_name }}</td>
            <td>{{ user.email }}</td>
            <td>
                <a href="{% url 'accounts:approve_user' user.id %}">Approve</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4">No users pending approval.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
